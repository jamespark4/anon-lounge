<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>익명라운지</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#080808;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;overscroll-behavior:none;}
input,textarea,select,button{font-family:inherit;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#0a0a0a;}::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}
.fi{animation:fi .22s ease;}@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.bp:active{transform:scale(.96);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── 상수 ──────────────────────────────────────────────
const FC='#ff6b9d',MC='#4a9eff',GD='#d4af37';
const BG='#080808',CARD='#131313',BR='#1e1e1e';
const COST_HEART=9,COST_VIEW=4,COST_PHONE=120;
const BODY_TYPES=['슬림','보통','탄탄/근육질','통통'];
const PERSONALITIES=['활발한','차분한','유머러스한','진지한','낭만적인','감성적인','계획적인','즉흥적인','내향적인','외향적인'];
const HOBBIES=['여행','독서','운동','요리','영화/드라마','게임','음악','카페','맛집탐방','등산','헬스','사진','골프','드라이브','반려동물'];
const JOBS=['직장인','자영업자','학생','프리랜서','기타'];
const COIN_PKG=[
  {id:'p1',coins:10,price:1000,label:'소량'},
  {id:'p2',coins:30,price:2900,label:'기본'},
  {id:'p3',coins:90,price:8500,label:'인기',pop:true},
  {id:'p4',coins:200,price:18000,label:'대용량'},
  {id:'p5',coins:450,price:38000,label:'프리미엄'},
];

// ── API 헬퍼 ──────────────────────────────────────────
async function api(method, path, body, token){
  const res = await fetch('/api'+path, {
    method, headers:{'Content-Type':'application/json', ...(token?{Authorization:`Bearer ${token}`}:{})},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error || '오류가 발생했어요');
  return data;
}

// ── 유틸 ──────────────────────────────────────────────
const ago=ts=>{
  if(!ts)return'';
  const d=Date.now()/1000-ts,m=Math.floor(d/60),h=Math.floor(d/3600),dy=Math.floor(d/86400);
  if(m<1)return'방금';if(m<60)return`${m}분 전`;if(h<24)return`${h}시간 전`;return`${dy}일 전`;
};
const gc=g=>g==='F'?FC:MC;
const coinToWon=c=>(c*100).toLocaleString();
const MIN_BIRTH_YEAR=new Date().getFullYear()-19;

// ── 베이스 컴포넌트 ───────────────────────────────────
function Avatar({gender,size=40,photo,sx={}}){
  if(photo)return<img src={photo} alt="" style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0,...sx}}/>;
  const isF=gender==='F';
  return<div style={{width:size,height:size,borderRadius:'50%',background:isF?'linear-gradient(135deg,#ff6b9d,#c44569)':'linear-gradient(135deg,#4a9eff,#1a66cc)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.42,color:'#fff',fontWeight:'bold',flexShrink:0,...sx}}>{isF?'♀':'♂'}</div>;
}
function GBadge({gender,sm=true}){
  const c=gc(gender);
  return<span style={{background:`${c}18`,color:c,border:`1px solid ${c}30`,borderRadius:20,padding:sm?'3px 9px':'5px 13px',fontSize:sm?10:12,fontWeight:700,whiteSpace:'nowrap'}}>{gender==='F'?'♀ 여성':'♂ 남성'}</span>;
}
function HIcon({filled=false,size=16,color=FC}){
  return<svg width={size} height={size} viewBox="0 0 24 24" fill={filled?color:'none'} stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
}
function Toast({msg}){
  if(!msg)return null;
  return<div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',border:`1px solid ${GD}44`,borderRadius:12,padding:'10px 18px',color:GD,fontSize:13,fontWeight:700,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.6)'}}>{msg}</div>;
}
function Spinner(){return<div style={{display:'flex',justifyContent:'center',padding:'40px'}}><div style={{width:24,height:24,border:`2px solid ${BR}`,borderTop:`2px solid ${FC}`,borderRadius:'50%',animation:'spin 1s linear infinite'}}/><style>{'@keyframes spin{to{transform:rotate(360deg)}}'}</style></div>;}

// Sheet & Dialog
function Sheet({children,onClose,mh='90vh'}){
  return<div style={{position:'fixed',inset:0,zIndex:900,background:'rgba(0,0,0,.88)',display:'flex',flexDirection:'column',justifyContent:'flex-end',alignItems:'center'}} onClick={onClose}>
    <div className="fi" style={{background:'#111',borderRadius:'22px 22px 0 0',width:'100%',maxWidth:500,maxHeight:mh,display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
      <div style={{width:34,height:4,background:'#2a2a2a',borderRadius:2,margin:'10px auto 0'}}/>
      {children}
    </div>
  </div>;
}
function Dialog({children,onClose}){
  return<div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={onClose}>
    <div className="fi" style={{background:'#111',borderRadius:22,width:'100%',maxWidth:360,overflow:'hidden'}} onClick={e=>e.stopPropagation()}>{children}</div>
  </div>;
}

// ── 댓글 모달 ─────────────────────────────────────────
function CommentModal({post,token,currentUser,onClose,onAdded}){
  const[comments,setComments]=useState([]);
  const[text,setText]=useState('');
  const[loading,setLoading]=useState(true);
  const ref=useRef();

  useEffect(()=>{
    api('GET',`/posts/${post.id}/comments`,null,token).then(setComments).finally(()=>setLoading(false));
    setTimeout(()=>ref.current?.focus(),300);
  },[]);

  const submit=async()=>{
    if(!text.trim())return;
    try{
      const c=await api('POST',`/posts/${post.id}/comments`,{content:text.trim()},token);
      setComments(p=>[...p,c]);setText('');onAdded();
    }catch(e){alert(e.message);}
  };

  return<Sheet onClose={onClose} mh="92vh">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px 8px'}}>
      <span style={{color:'#fff',fontSize:15,fontWeight:700}}>댓글 {comments.length}개</span>
      <button onClick={onClose} style={{background:'#222',border:'none',color:'#777',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
    </div>
    <div style={{margin:'0 14px 10px',padding:'10px 12px',background:'#0a0a0a',borderRadius:12,border:`1px solid ${BR}`}}>
      <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:5}}><Avatar gender={post.gender} size={24}/><GBadge gender={post.gender}/></div>
      <p style={{color:'#999',fontSize:12,margin:0,lineHeight:1.6}}>{post.content.slice(0,70)}{post.content.length>70?'…':''}</p>
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'0 14px'}}>
      {loading&&<Spinner/>}
      {!loading&&comments.length===0&&<div style={{textAlign:'center',padding:'24px',color:'#333',fontSize:13}}>첫 댓글을 남겨보세요 💬</div>}
      {comments.map(c=>(
        <div key={c.id} style={{display:'flex',gap:9,marginBottom:12}}>
          <Avatar gender={c.gender} size={30}/>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}><GBadge gender={c.gender}/><span style={{color:'#333',fontSize:10}}>{ago(c.created_at)}</span></div>
            <p style={{color:'#ccc',fontSize:13,margin:0,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{c.content}</p>
          </div>
        </div>
      ))}
    </div>
    <div style={{padding:'10px 12px 16px',borderTop:`1px solid ${BR}`,display:'flex',gap:8,alignItems:'flex-end'}}>
      <Avatar gender={currentUser.gender} size={30} photo={currentUser.photo}/>
      <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}}}
        placeholder="댓글 입력…" rows={1}
        style={{flex:1,background:'#1a1a1a',border:`1px solid ${BR}`,borderRadius:18,padding:'8px 13px',color:'#fff',fontSize:13,outline:'none',resize:'none',maxHeight:80,overflowY:'auto',lineHeight:1.5}}/>
      <button onClick={submit} style={{width:34,height:34,background:text.trim()?FC:'#222',border:'none',borderRadius:'50%',color:'#fff',fontSize:17,cursor:text.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'background .2s'}}>↑</button>
    </div>
  </Sheet>;
}

// ── 하트 보내기 확인 ──────────────────────────────────
function HeartConfirm({post,currentUser,token,onDone,onCancel}){
  const[loading,setLoading]=useState(false);
  const ok=currentUser.coins>=COST_HEART;
  const submit=async()=>{
    if(!ok||loading)return;
    setLoading(true);
    try{const r=await api('POST','/likes',{postId:post.id},token);onDone(r.coins);}
    catch(e){alert(e.message);}finally{setLoading(false);}
  };
  return<Dialog onClose={onCancel}>
    <div style={{padding:'26px 22px',textAlign:'center'}}>
      <div style={{fontSize:40,marginBottom:8}}>💝</div>
      <h3 style={{color:'#fff',margin:'0 0 6px',fontSize:17,fontWeight:800}}>호감 보내기</h3>
      <p style={{color:'#777',fontSize:12,lineHeight:1.7,margin:'0 0 14px'}}>
        <b style={{color:FC}}>{COST_HEART}코인 (≈{coinToWon(COST_HEART)}원)</b>이 사용돼요.<br/>
        상대방이 열람하면 서로 프로필 공개!
      </p>
      <div style={{background:'#0a0a0a',borderRadius:12,padding:'10px 12px',marginBottom:14}}>
        <p style={{color:'#999',fontSize:12,margin:0,lineHeight:1.5}}>"{post.content.slice(0,55)}…"</p>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',padding:'9px 12px',background:'#0a0a0a',borderRadius:10,marginBottom:18}}>
        <span style={{color:'#666',fontSize:12}}>보유 코인</span>
        <span style={{color:'#fff',fontWeight:700}}>🪙 {currentUser.coins}</span>
      </div>
      {!ok&&<p style={{color:FC,fontSize:12,margin:'0 0 10px'}}>코인이 부족해요!</p>}
      <div style={{display:'flex',gap:9}}>
        <button onClick={onCancel} style={{flex:1,padding:'12px',background:'#1a1a1a',border:`1px solid ${BR}`,borderRadius:12,color:'#888',fontSize:13,cursor:'pointer'}}>취소</button>
        <button onClick={submit} disabled={!ok||loading} style={{flex:2,padding:'12px',background:ok&&!loading?`linear-gradient(135deg,${FC},#c44569)`:'#222',border:'none',borderRadius:12,color:ok&&!loading?'#fff':'#555',fontSize:13,fontWeight:700,cursor:ok&&!loading?'pointer':'default'}}>
          {loading?'처리 중…':'💝 호감 보내기'}
        </button>
      </div>
    </div>
  </Dialog>;
}

// ── 프로필 카드 ───────────────────────────────────────
function ProfileCard({user}){
  if(!user)return null;
  const age=new Date().getFullYear()-user.birthYear;
  return<div style={{background:'#0a0a0a',borderRadius:14,padding:'14px',marginTop:10}}>
    <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
      <Avatar gender={user.gender} size={56} photo={user.photo}/>
      <div style={{flex:1}}>
        <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:5}}>
          <GBadge gender={user.gender} sm={false}/>
          <span style={{fontSize:10,color:GD,background:`${GD}18`,padding:'2px 7px',borderRadius:10,fontWeight:700}}>프로필 공개</span>
        </div>
        <div style={{color:'#fff',fontSize:14,fontWeight:700,marginBottom:2}}>만 {age}세 · {user.job}</div>
        <div style={{color:'#777',fontSize:11,marginBottom:5}}>키 {user.height}cm · {user.bodyType}</div>
        <p style={{color:'#bbb',fontSize:12,margin:'0 0 7px',lineHeight:1.5}}>{user.bio}</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {[...(user.personality||[]),...(user.hobbies||[])].slice(0,5).map(t=>(
            <span key={t} style={{background:'#1a1a1a',border:`1px solid ${BR}`,borderRadius:20,padding:'2px 8px',color:'#666',fontSize:10}}>{t}</span>
          ))}
        </div>
      </div>
    </div>
  </div>;
}

// ── 게시글 카드 ───────────────────────────────────────
function PostCard({post,currentUser,onHeart,onComment}){
  const[exp,setExp]=useState(false);
  const c=gc(post.gender);
  const long=post.content.length>130;
  const shown=exp||!long?post.content:post.content.slice(0,130)+'…';
  const isOwn=post.user_id===currentUser.id;

  return<div style={{background:CARD,border:`1px solid ${c}22`,borderRadius:18,padding:'15px',marginBottom:10}}>
    <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:11}}>
      <Avatar gender={post.gender} size={34}/>
      <div><GBadge gender={post.gender}/><div style={{color:'#333',fontSize:10,marginTop:3}}>{ago(post.created_at)}</div></div>
      {isOwn&&<span style={{marginLeft:'auto',color:'#2e2e2e',fontSize:11}}>내 글</span>}
    </div>
    <p style={{color:'#d5d5d5',fontSize:14,lineHeight:1.72,margin:'0 0 2px',whiteSpace:'pre-wrap'}}>{shown}</p>
    {long&&!exp&&<button onClick={()=>setExp(true)} style={{background:'none',border:'none',color:GD,fontSize:12,padding:'3px 0',cursor:'pointer'}}>더 보기 ▾</button>}
    <div style={{display:'flex',gap:7,marginTop:12}}>
      {!isOwn&&<button onClick={()=>onHeart(post)} className="bp" style={{display:'flex',alignItems:'center',gap:5,background:post.iLiked?`${FC}18`:'#1a1a1a',border:`1px solid ${post.iLiked?FC+'44':BR}`,borderRadius:30,padding:'7px 12px',cursor:post.iLiked?'default':'pointer',transition:'all .2s'}}>
        <HIcon filled={post.iLiked} size={13} color={FC}/>
        <span style={{color:post.iLiked?FC:'#555',fontSize:12,fontWeight:600}}>{post.iLiked?post.heartCount:`${COST_HEART}코인`}</span>
      </button>}
      <button onClick={()=>onComment(post)} className="bp" style={{display:'flex',alignItems:'center',gap:5,background:'#1a1a1a',border:`1px solid ${BR}`,borderRadius:30,padding:'7px 12px',cursor:'pointer'}}>
        <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span style={{color:'#555',fontSize:12,fontWeight:600}}>{post.commentCount>0?post.commentCount:'댓글'}</span>
      </button>
    </div>
  </div>;
}

// ── 글쓰기 ────────────────────────────────────────────
function CreatePost({currentUser,token,onClose,onCreated}){
  const[text,setText]=useState('');
  const[loading,setLoading]=useState(false);
  const ref=useRef();
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),250);},[]);
  const submit=async()=>{
    if(!text.trim()||loading)return;
    setLoading(true);
    try{const p=await api('POST','/posts',{content:text.trim()},token);onCreated(p);onClose();}
    catch(e){alert(e.message);}finally{setLoading(false);}
  };
  return<Sheet onClose={onClose} mh="78vh">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px 10px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <Avatar gender={currentUser.gender} size={28} photo={currentUser.photo}/>
        <div><div style={{color:'#fff',fontSize:12,fontWeight:700}}>익명 글쓰기</div><div style={{color:'#3a3a3a',fontSize:10}}>{currentUser.gender==='F'?'여성':'남성'} 뱃지로만 표시</div></div>
      </div>
      <button onClick={onClose} style={{background:'#222',border:'none',color:'#666',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
    </div>
    <div style={{flex:1,padding:'0 14px'}}>
      <textarea ref={ref} value={text} onChange={e=>setText(e.target.value.slice(0,500))} placeholder="솔직하게 이야기해보세요 💬&#10;이름은 익명이고 성별만 표시돼요"
        style={{width:'100%',minHeight:150,background:'#0a0a0a',border:`1px solid ${BR}`,borderRadius:12,padding:'12px',color:'#e0e0e0',fontSize:14,lineHeight:1.7,resize:'none',outline:'none',boxSizing:'border-box'}}/>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 16px 16px'}}>
      <span style={{color:'#2a2a2a',fontSize:11}}>{text.length}/500</span>
      <button onClick={submit} disabled={!text.trim()||loading} style={{padding:'10px 20px',background:text.trim()&&!loading?`linear-gradient(135deg,${FC},#c44569)`:'#1a1a1a',border:'none',borderRadius:12,color:text.trim()&&!loading?'#fff':'#444',fontSize:13,fontWeight:700,cursor:text.trim()&&!loading?'pointer':'default',transition:'all .2s'}}>
        {loading?'게시 중…':'게시하기 ✓'}
      </button>
    </div>
  </Sheet>;
}

// ── 라운지 화면 ───────────────────────────────────────
function LoungeScreen({currentUser,token,onCoinsChange,toast}){
  const[posts,setPosts]=useState([]);
  const[filter,setFilter]=useState('all');
  const[loading,setLoading]=useState(true);
  const[heartModal,setHeartModal]=useState(null);
  const[commentPost,setCommentPost]=useState(null);
  const[creating,setCreating]=useState(false);

  const load=useCallback(async()=>{
    try{const q=filter==='all'?'':('?gender='+filter);const p=await api('GET','/posts'+q,null,token);setPosts(p);}
    catch{}finally{setLoading(false);}
  },[filter,token]);

  useEffect(()=>{setLoading(true);load();},[filter]);
  useEffect(()=>{const t=setInterval(load,8000);return()=>clearInterval(t);},[load]);

  const handleHeart=async(post)=>{
    if(post.iLiked)return;
    setHeartModal(post);
  };
  const onHeartDone=async(newCoins)=>{
    onCoinsChange(newCoins);
    setPosts(p=>p.map(post=>post.id===heartModal.id?{...post,iLiked:true,heartCount:post.heartCount+1}:post));
    setHeartModal(null);
  };

  return<div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>
    <div style={{display:'flex',gap:6,padding:'9px 13px',borderBottom:`1px solid ${BR}`,flexShrink:0}}>
      {[['all','전체',GD],['F','♀ 여성',FC],['M','♂ 남성',MC]].map(([f,l,c])=>(
        <button key={f} onClick={()=>setFilter(f)} className="bp" style={{padding:'6px 12px',background:filter===f?`${c}18`:'#111',border:`1px solid ${filter===f?c+'44':BR}`,borderRadius:20,color:filter===f?c:'#3a3a3a',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .2s'}}>{l}</button>
      ))}
    </div>
    <div style={{flex:1,overflowY:'auto',padding:'10px 13px 80px'}}>
      {loading&&<Spinner/>}
      {!loading&&posts.length===0&&<div style={{textAlign:'center',padding:'50px',color:'#2e2e2e'}}><div style={{fontSize:36,marginBottom:8}}>💬</div>첫 글을 남겨보세요!</div>}
      {posts.map(p=><PostCard key={p.id} post={p} currentUser={currentUser} onHeart={handleHeart} onComment={setCommentPost}/>)}
    </div>
    <button onClick={()=>setCreating(true)} className="bp" style={{position:'absolute',bottom:14,right:14,width:50,height:50,background:`linear-gradient(135deg,${FC},#c44569)`,border:'none',borderRadius:'50%',color:'#fff',fontSize:20,cursor:'pointer',boxShadow:`0 4px 16px ${FC}55`,display:'flex',alignItems:'center',justifyContent:'center',zIndex:50}}>✏️</button>
    {heartModal&&<HeartConfirm post={heartModal} currentUser={currentUser} token={token} onDone={onHeartDone} onCancel={()=>setHeartModal(null)}/>}
    {commentPost&&<CommentModal post={commentPost} token={token} currentUser={currentUser} onClose={()=>setCommentPost(null)} onAdded={()=>setPosts(p=>p.map(x=>x.id===commentPost.id?{...x,commentCount:x.commentCount+1}:x))}/>}
    {creating&&<CreatePost currentUser={currentUser} token={token} onClose={()=>setCreating(false)} onCreated={p=>{setPosts(prev=>[p,...prev]);}}/>}
  </div>;
}

// ── 알림 화면 ─────────────────────────────────────────
function NotifScreen({currentUser,token,onCoinsChange}){
  const[received,setReceived]=useState([]);
  const[sent,setSent]=useState([]);
  const[loading,setLoading]=useState(true);

function RegisterWizard({onDone}){
  const[step,setStep]=useState(1);
  const[gender,setGender]=useState('');
  const[birthYear,setBirthYear]=useState('');
  const[password,setPassword]=useState('');
  const[photo,setPhoto]=useState(null);
  const[height,setHeight]=useState('');
  const[bodyType,setBodyType]=useState('');
  const[job,setJob]=useState('');
  const[personality,setPersonality]=useState([]);
  const[hobbies,setHobbies]=useState([]);
  const[bio,setBio]=useState('');
  const[phone,setPhone]=useState('');
  const[loading,setLoading]=useState(false);
  const fileRef=useRef();

  const ageOk=parseInt(birthYear)<=MIN_BIRTH_YEAR;
  const toggle=(arr,set,val,max=3)=>{arr.includes(val)?set(arr.filter(v=>v!==val)):arr.length<max&&set([...arr,val]);};

  const compressPhoto=file=>new Promise(resolve=>{
    const img=new Image();const r=new FileReader();
    r.onload=e=>{img.src=e.target.result;img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=400;let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.75));
    };};
    r.readAsDataURL(file);
  });

  const canNext=[
    gender&&birthYear&&ageOk&&password.length>=6,
    true,
    height&&bodyType&&job,
    personality.length>0&&hobbies.length>0,
    bio.length>=5&&phone.length>=10,
  ];

  const finish=async()=>{
    if(loading)return;
    setLoading(true);
    try{
      const r=await api('POST','/auth/register',{gender,birthYear:parseInt(birthYear),photo,height:parseInt(height),bodyType,job,personality,hobbies,bio,phone,password});
      localStorage.setItem('token',r.token);
      onDone(r.token,r.user);
    }catch(e){alert(e.message);}finally{setLoading(false);}
  };

  const steps=[
    {t:'기본 설정',s:'만 19세 이상만 가입 가능해요'},
    {t:'셀카 등록',s:'수락 시에만 상대에게 공개돼요'},
    {t:'기본 정보',s:'프로필에 표시될 내용이에요'},
    {t:'성격 & 취미',s:'최대 3개씩 선택해요'},
    {t:'소개 & 연락처',s:'번호는 번호 오픈 시에만 공개'},
  ];

  return<div style={{minHeight:'100vh',background:BG,overflowY:'auto',padding:'24px 20px'}}>
    <div style={{textAlign:'center',marginBottom:20,marginTop:12}}>
      <h1 style={{margin:'0 0 2px',fontSize:20,fontWeight:900,background:`linear-gradient(135deg,${FC},${GD})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>🌙 익명라운지</h1>
      <p style={{color:'#2a2a2a',fontSize:11,margin:0}}>회원가입 · 성인 인증 필수</p>
    </div>
    <div style={{maxWidth:400,margin:'0 auto'}}>
      <div style={{display:'flex',gap:5,marginBottom:6}}>
        {[1,2,3,4,5].map(s=><div key={s} style={{flex:1,height:3,borderRadius:2,background:step>=s?FC:'#151515',transition:'background .3s'}}/>)}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
        <div><span style={{color:'#fff',fontSize:13,fontWeight:700}}>{steps[step-1].t}</span><p style={{color:'#444',fontSize:11,margin:'2px 0 0'}}>{steps[step-1].s}</p></div>
        <span style={{color:'#333',fontSize:11,marginTop:2}}>{step}/5</span>
      </div>

      <div className="fi">
        {step===1&&<div>
          <div style={{display:'flex',gap:10,marginBottom:18}}>
            {[['F','♀','여성'],['M','♂','남성']].map(([g,ic,lb])=>(
              <button key={g} onClick={()=>setGender(g)} className="bp" style={{flex:1,padding:'22px 10px',background:gender===g?`${gc(g)}15`:CARD,border:`2px solid ${gender===g?gc(g):BR}`,borderRadius:16,cursor:'pointer',textAlign:'center',transition:'all .2s'}}>
                <div style={{fontSize:30,color:gc(g),marginBottom:5}}>{ic}</div>
                <div style={{color:'#fff',fontSize:14,fontWeight:700}}>{lb}</div>
              </button>
            ))}
          </div>
          {[
            ['출생연도 *','number',birthYear,setBirthYear,'예: 1995'],
            ['비밀번호 * (6자 이상)','password',password,setPassword,'로그인 시 사용'],
          ].map(([lbl,tp,val,set,ph])=>(
            <div key={lbl} style={{marginBottom:12}}>
              <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:5}}>{lbl}</label>
              <input type={tp} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
                style={{width:'100%',padding:'12px 14px',background:CARD,border:`1px solid ${BR}`,borderRadius:12,color:'#fff',fontSize:14,outline:'none',boxSizing:'border-box'}}/>
            </div>
          ))}
          {birthYear&&!ageOk&&<p style={{color:FC,fontSize:11,margin:'0 0 8px'}}>⚠️ 만 19세 이상만 가입 가능해요</p>}
          {birthYear&&ageOk&&<p style={{color:'#4caf50',fontSize:11,margin:'0 0 8px'}}>✓ 성인 확인 (만 {new Date().getFullYear()-parseInt(birthYear)}세)</p>}
        </div>}

        {step===2&&<div style={{textAlign:'center'}}>
          <div onClick={()=>fileRef.current?.click()} style={{width:120,height:120,borderRadius:'50%',background:photo?'none':CARD,border:`2px dashed ${photo?FC:BR}`,margin:'0 auto 12px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
            {photo?<img src={photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:<div><div style={{fontSize:28,marginBottom:4}}>📷</div><div style={{color:'#3a3a3a',fontSize:11}}>셀카 추가</div></div>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{const f=e.target.files[0];if(f)setPhoto(await compressPhoto(f));}}/>
          {photo&&<button onClick={()=>setPhoto(null)} style={{background:'none',border:'none',color:'#444',fontSize:12,cursor:'pointer',marginBottom:8}}>삭제 ✕</button>}
          <p style={{color:'#333',fontSize:11,lineHeight:1.7,margin:'12px 0'}}>• 셀카 사진은 선택사항이에요<br/>• 상대가 프로필 열람 시에만 공개돼요</p>
        </div>}

        {step===3&&<div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:5}}>키 (cm) *</label>
          <input type="number" value={height} onChange={e=>setHeight(e.target.value)} placeholder="예: 170"
            style={{width:'100%',padding:'12px 14px',background:CARD,border:`1px solid ${BR}`,borderRadius:12,color:'#fff',fontSize:14,outline:'none',boxSizing:'border-box',marginBottom:14}}/>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:7}}>체형 *</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:14}}>
            {BODY_TYPES.map(bt=><button key={bt} onClick={()=>setBodyType(bt)} className="bp" style={{padding:'7px 13px',background:bodyType===bt?`${FC}15`:CARD,border:`1px solid ${bodyType===bt?FC+'44':BR}`,borderRadius:20,color:bodyType===bt?FC:'#555',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{bt}</button>)}
          </div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:7}}>직업 *</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
            {JOBS.map(j=><button key={j} onClick={()=>setJob(j)} className="bp" style={{padding:'7px 13px',background:job===j?`${GD}15`:CARD,border:`1px solid ${job===j?GD+'44':BR}`,borderRadius:20,color:job===j?GD:'#555',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{j}</button>)}
          </div>
        </div>}

        {step===4&&<div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:7}}>성격 * <span style={{color:'#333'}}>(최대 3개, {personality.length}/3)</span></label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:18}}>
            {PERSONALITIES.map(p=>{const s=personality.includes(p);return<button key={p} onClick={()=>toggle(personality,setPersonality,p)} className="bp" style={{padding:'7px 12px',background:s?`${FC}15`:CARD,border:`1px solid ${s?FC+'44':BR}`,borderRadius:20,color:s?FC:'#555',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{p}</button>;})}
          </div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:7}}>취미 * <span style={{color:'#333'}}>(최대 3개, {hobbies.length}/3)</span></label>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {HOBBIES.map(h=>{const s=hobbies.includes(h);return<button key={h} onClick={()=>toggle(hobbies,setHobbies,h)} className="bp" style={{padding:'7px 12px',background:s?`${MC}15`:CARD,border:`1px solid ${s?MC+'44':BR}`,borderRadius:20,color:s?MC:'#555',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{h}</button>;})}
          </div>
        </div>}

        {step===5&&<div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:5}}>한줄 소개 *</label>
          <textarea value={bio} onChange={e=>setBio(e.target.value.slice(0,100))} placeholder="나를 간단히 소개해주세요"
            style={{width:'100%',minHeight:75,background:CARD,border:`1px solid ${BR}`,borderRadius:12,padding:'11px 13px',color:'#fff',fontSize:14,lineHeight:1.6,resize:'none',outline:'none',boxSizing:'border-box',marginBottom:4}}/>
          <div style={{color:'#2a2a2a',fontSize:10,textAlign:'right',marginBottom:14}}>{bio.length}/100</div>
          <label style={{color:'#555',fontSize:11,fontWeight:700,display:'block',marginBottom:5}}>전화번호 * <span style={{color:'#2a2a2a'}}>(번호 오픈 시에만 공개)</span></label>
          <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000"
            style={{width:'100%',padding:'12px 14px',background:CARD,border:`1px solid ${BR}`,borderRadius:12,color:'#fff',fontSize:14,outline:'none',boxSizing:'border-box',marginBottom:10}}/>
          <div style={{background:'#050f05',border:'1px solid #1a2a1a',borderRadius:12,padding:'10px 12px'}}>
            <p style={{color:'#4caf50',fontSize:11,fontWeight:700,margin:'0 0 4px'}}>🎁 가입 완료 후 제공</p>
            <p style={{color:'#3a3a3a',fontSize:11,margin:0,lineHeight:1.6}}>• 즉시 10코인 무료 증정 (≈1,000원)</p>
          </div>
        </div>}
      </div>

      <div style={{display:'flex',gap:9,marginTop:22}}>
        {step>1&&<button onClick={()=>setStep(step-1)} style={{flex:1,padding:'13px',background:'#111',border:`1px solid ${BR}`,borderRadius:13,color:'#777',fontSize:14,cursor:'pointer'}}>이전</button>}
        {step<5?(
          <button onClick={()=>canNext[step-1]&&setStep(step+1)} style={{flex:2,padding:'13px',background:canNext[step-1]?`linear-gradient(135deg,${FC},#c44569)`:'#111',border:'none',borderRadius:13,color:canNext[step-1]?'#fff':'#333',fontSize:14,fontWeight:700,cursor:canNext[step-1]?'pointer':'default',transition:'all .2s'}}>다음 →</button>
        ):(
          <button onClick={()=>canNext[4]&&finish()} disabled={loading} style={{flex:2,padding:'13px',background:canNext[4]&&!loading?`linear-gradient(135deg,${GD}cc,${GD}77)`:'#111',border:'none',borderRadius:13,color:canNext[4]&&!loading?'#111':'#333',fontSize:14,fontWeight:900,cursor:canNext[4]&&!loading?'pointer':'default'}}>
            {loading?'가입 중…':'시작하기 ✨'}
          </button>
        )}
      </div>
    </div>
  </div>;
}

// ── 로그인 화면 ───────────────────────────────────────
function AuthScreen({onDone,onRegister}){
  const[phone,setPhone]=useState('');
  const[password,setPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!phone||!password||loading)return;
    setLoading(true);
    try{
      const r=await api('POST','/auth/login',{phone,password});
      localStorage.setItem('token',r.token);
      onDone(r.token,r.user);
    }catch(e){alert(e.message);}finally{setLoading(false);}
  };
  return<div style={{minHeight:'100vh',background:BG,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 22px'}}>
    <div style={{textAlign:'center',marginBottom:44}}>
      <div style={{fontSize:52,marginBottom:10}}>🌙</div>
      <h1 style={{margin:'0 0 4px',fontSize:30,fontWeight:900,background:`linear-gradient(135deg,${FC},${GD})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>익명라운지</h1>
      <p style={{color:'#2e2e2e',fontSize:12,margin:'0 0 8px'}}>솔직한 이야기를 나누는 성인 전용 공간</p>
      <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'#0d0d0d',border:`1px solid ${BR}`,borderRadius:20,padding:'4px 12px'}}>
        <span style={{color:'#4caf50',fontSize:11}}>🔒</span>
        <span style={{color:'#3a3a3a',fontSize:10}}>만 19세 이상 전용</span>
      </div>
    </div>
    <div style={{width:'100%',maxWidth:360}}>
      {[['전화번호','tel',phone,setPhone,'010-0000-0000'],['비밀번호','password',password,setPassword,'비밀번호 입력']].map(([lbl,tp,val,set,ph])=>(
        <div key={lbl} style={{marginBottom:11}}>
          <label style={{color:'#444',fontSize:11,fontWeight:700,display:'block',marginBottom:5}}>{lbl}</label>
          <input type={tp} value={val} onChange={e=>set(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder={ph}
            style={{width:'100%',padding:'13px 15px',background:CARD,border:`1px solid ${BR}`,borderRadius:12,color:'#fff',fontSize:15,outline:'none',boxSizing:'border-box'}}/>
        </div>
      ))}
      <button onClick={submit} disabled={loading} className="bp" style={{width:'100%',padding:'14px',background:`linear-gradient(135deg,${FC},#c44569)`,border:'none',borderRadius:13,color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',marginBottom:9,marginTop:4}}>
        {loading?'로그인 중…':'로그인'}
      </button>
      <button onClick={onRegister} className="bp" style={{width:'100%',padding:'14px',background:CARD,border:`1px solid ${BR}`,borderRadius:13,color:'#999',fontSize:14,cursor:'pointer'}}>
        회원가입 (만 19세 이상)
      </button>
    </div>
  </div>;
}

// ── 바텀 내비 ─────────────────────────────────────────
function BottomNav({tab,onChange,badge}){
  return<div style={{display:'flex',borderTop:`1px solid ${BR}`,background:'#0a0a0a',flexShrink:0}}>
    {[['lounge','🏠','라운지'],['notif','💌','알림'],['shop','🪙','코인'],['me','👤','프로필']].map(([id,ic,lb])=>(
      <button key={id} onClick={()=>onChange(id)} style={{flex:1,padding:'9px 4px 10px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
        <span style={{fontSize:20}}>{ic}</span>
        <span style={{color:tab===id?FC:'#333',fontSize:9,fontWeight:tab===id?800:500,transition:'color .2s'}}>{lb}</span>
        {id==='notif'&&badge>0&&<div style={{position:'absolute',top:6,left:'54%',background:FC,borderRadius:'50%',minWidth:15,height:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:800,padding:'0 3px'}}>{badge}</div>}
        {tab===id&&<div style={{position:'absolute',bottom:0,width:18,height:2,background:FC,borderRadius:1}}/>}
      </button>
    ))}
  </div>;
}

// ── 앱 루트 ───────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState('loading'); // loading|auth|register|main
  const[tab,setTab]=useState('lounge');
  const[token,setToken]=useState('');
  const[user,setUser]=useState(null);
  const[badge,setBadge]=useState(0);
  const[toast,setToast]=useState('');

  useEffect(()=>{
    const t=localStorage.getItem('token');
    if(!t){setScreen('auth');return;}
    api('GET','/me',null,t).then(u=>{setToken(t);setUser(u);setScreen('main');}).catch(()=>{localStorage.removeItem('token');setScreen('auth');});
  },[]);

  // 알림 배지 폴링
  useEffect(()=>{
    if(screen!=='main'||!token)return;
    const checkBadge=()=>{api('GET','/likes/received',null,token).then(r=>setBadge(r.filter(l=>l.status==='sent').length)).catch(()=>{});};
    checkBadge();
    const t=setInterval(checkBadge,15000);return()=>clearInterval(t);
  },[screen,token]);

  const login=(t,u)=>{setToken(t);setUser(u);setScreen('main');};
  const updateCoins=c=>setUser(u=>({...u,coins:c}));
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),3000);};

  if(screen==='loading')return<div style={{height:'100vh',background:BG,display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:8}}>🌙</div><p style={{color:'#333',fontSize:13}}>로딩 중…</p></div></div>;
  if(screen==='auth')return<AuthScreen onDone={login} onRegister={()=>setScreen('register')}/>;
  if(screen==='register')return<RegisterWizard onDone={login}/>;

  return<div style={{height:'100vh',display:'flex',flexDirection:'column',background:BG,maxWidth:500,margin:'0 auto',overflow:'hidden'}}>
    <Toast msg={toast}/>
    <div style={{padding:'12px 14px 10px',borderBottom:`1px solid ${BR}`,background:'#0b0b0b',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <div>
        <h1 style={{margin:0,fontSize:17,fontWeight:900,background:`linear-gradient(135deg,${FC},${GD})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>🌙 익명라운지</h1>
        <p style={{color:'#252525',fontSize:10,margin:'1px 0 0'}}>
          {tab==='lounge'?'익명으로 솔직하게':tab==='notif'?'하트 & 프로필 알림':tab==='shop'?'코인 충전소':'내 프로필'}
        </p>
      </div>
      <div onClick={()=>setTab('shop')} style={{display:'flex',alignItems:'center',gap:5,background:CARD,borderRadius:20,padding:'5px 11px',border:`1px solid ${GD}20`,cursor:'pointer'}}>
        <span style={{fontSize:13}}>🪙</span><span style={{color:'#fff',fontSize:13,fontWeight:800}}>{user?.coins}</span>
      </div>
    </div>
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {tab==='lounge'&&<LoungeScreen currentUser={user} token={token} onCoinsChange={updateCoins}/>}
      {tab==='notif'&&<NotifScreen currentUser={user} token={token} onCoinsChange={updateCoins}/>}
      {tab==='shop'&&<ShopScreen currentUser={user} token={token} onCoinsChange={updateCoins}/>}
      {tab==='me'&&<MyProfileScreen currentUser={user} token={token}/>}
    </div>
    <BottomNav tab={tab} onChange={setTab} badge={badge}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
